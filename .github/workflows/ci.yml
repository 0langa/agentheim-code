name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
      - name: Install project
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check src/agentheim_code src/memory src/tools/shell tests/
      - name: Format check
        run: ruff format --check src/agentheim_code src/memory src/tools/shell tests/
      - name: Type check
        run: mypy src/agentheim_code src/memory src/tools/shell --follow-imports=skip
      - name: Test with coverage
        run: pytest --cov --cov-report=xml --cov-fail-under=80 -m "not integration"
      - name: Build wheel
        run: python -m build --wheel
      - name: Clean wheel smoke
        shell: bash
        run: |
          python -m venv /tmp/agentheim-code-wheel
          /tmp/agentheim-code-wheel/bin/python -m pip install dist/*.whl
          /tmp/agentheim-code-wheel/bin/agentheim-code --help
          /tmp/agentheim-code-wheel/bin/agentheim-code models --json
          /tmp/agentheim-code-wheel/bin/python -c "from agentheim_code.backend import create_app; create_app('.')"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('apps/web/package-lock.json') }}
      - name: Install dependencies
        run: npm --prefix apps/web ci
      - name: Unit tests
        run: npm --prefix apps/web run test -- --run
      - name: Type check and build
        run: npm --prefix apps/web run build
      - name: Install Playwright browser
        run: |
          cd apps/web
          npx playwright install --with-deps chromium
      - name: Playwright smoke
        run: npm --prefix apps/web run e2e

  desktop-rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-action@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('apps/web/package-lock.json') }}
      - name: Build web assets
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build
      - name: Rust tests
        run: cd apps/desktop/src-tauri && cargo test
      - name: Build Tauri
        run: npm --prefix apps/desktop run tauri build
        env:
          CI: true
      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: agentheim-code-windows-installer
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
